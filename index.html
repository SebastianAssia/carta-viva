<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Viva</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video id="video1" src="./momento1.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target0">
      <a-video
        id="videoPlane"
        src="#video1"
        width="1" height="0.552"
        position="0 0 0.001"
        rotation="0 0 0"
      ></a-video>
    </a-entity>

  </a-scene>

  <script>
    const target = document.getElementById('target0');
    const video = document.getElementById('video1');
    const videoPlane = document.getElementById('videoPlane');

    video.addEventListener('loadedmetadata', () => {
      const ratio = video.videoHeight / video.videoWidth;
      videoPlane.setAttribute('height', ratio);
    });

    target.addEventListener('targetFound', () => {
      video.muted = false;
      video.play();
    });

    target.addEventListener('targetLost', () => {
      video.pause();
      video.muted = true;
      video.currentTime = 0;
    });
  </script>
</body>
</html>
