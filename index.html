<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Viva</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 1.2rem;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="loading">Cargando Carta Viva...</div>

  <script>
    async function cargarConfig() {
      const res = await fetch('./config.json');
      const config = await res.json();
      return config;
    }

    function construirEscena(config) {
      const scene = document.createElement('a-scene');
      scene.setAttribute('mindar-image', 'imageTargetSrc: ./targets.mind; autoStart: true;');
      scene.setAttribute('color-space', 'sRGB');
      scene.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
      scene.setAttribute('vr-mode-ui', 'enabled: false');
      scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

      const assets = document.createElement('a-assets');
      config.pares.forEach((par, i) => {
        const video = document.createElement('video');
        video.id = `video${i}`;
        video.src = par.videoSrc;
        video.setAttribute('preload', 'auto');
        video.setAttribute('loop', '');
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        assets.appendChild(video);
      });
      scene.appendChild(assets);

      const camera = document.createElement('a-camera');
      camera.setAttribute('position', '0 0 0');
      camera.setAttribute('look-controls', 'enabled: false');
      scene.appendChild(camera);

      config.pares.forEach((par, i) => {
        const entity = document.createElement('a-entity');
        entity.setAttribute('mindar-image-target', `targetIndex: ${par.targetIndex}`);
        entity.id = `target${i}`;

        const videoPlane = document.createElement('a-video');
        videoPlane.id = `videoPlane${i}`;
        videoPlane.setAttribute('src', `#video${i}`);
        videoPlane.setAttribute('width', '1');
        videoPlane.setAttribute('height', '0.552');
        videoPlane.setAttribute('position', '0 0 0.001');

        entity.appendChild(videoPlane);
        scene.appendChild(entity);
      });

      document.body.appendChild(scene);

      config.pares.forEach((par, i) => {
        const entity = document.getElementById(`target${i}`);
        const video = document.getElementById(`video${i}`);
        const plane = document.getElementById(`videoPlane${i}`);

        if (video && plane) {
          video.addEventListener('loadedmetadata', () => {
            const ratio = video.videoHeight / video.videoWidth;
            plane.setAttribute('height', ratio);
          });
        }

        if (entity && video) {
          entity.addEventListener('targetFound', () => {
            video.muted = false;
            video.play();
          });

          entity.addEventListener('targetLost', () => {
            video.pause();
            video.muted = true;
            video.currentTime = 0;
          });
        }
      });

      document.getElementById('loading').style.display = 'none';
    }

    cargarConfig().then(config => {
      construirEscena(config);
    }).catch(err => {
      document.getElementById('loading').innerText = 'Error cargando configuración';
      console.error(err);
    });
  </script>
</body>
</html>
